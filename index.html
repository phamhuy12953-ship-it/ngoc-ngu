<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body {
    background-color: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: sans-serif;
    color: white;
    cursor: none; /* Giấu luôn con trỏ chuột cho nó sợ */
  }

  .rainbow-text {
    font-size: 50px;
    font-weight: bold;
    background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
    background-size: 400% 400%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: flow 3s linear infinite;
  }

  @keyframes flow {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
  }

  #warning {
    color: red;
    font-size: 20px;
    margin-top: 20px;
    display: none;
  }
</style>
<script>
  // Chiêu trêu: Hiện thông báo liên tục khi định thoát hoặc bấm vào màn hình
  function annoying() {
    alert("Ngọc định chạy đi đâu?");
    alert("Chưa nghe hết mà đã chạy à?");
    alert("Bấm OK 10 lần nữa để thoát nhé haha");
  }

  // Khi click vào màn hình là hiện thông báo
  document.onclick = function() {
    annoying();
  };
</script>
</head>
<body onclick="annoying()">

  <div class="rainbow-text">Ngọc bị ngu hahaha</div>
  <h2 style="color: white;">chan bố mày đi</h2>
  
  <p id="warning">CẢNH BÁO: MÁY CỦA NGỌC ĐÃ BỊ NHIỄM VIRUS NGU!(10tr r t tha) </p>

  <script>
    // Sau 3 giây hiện dòng cảnh báo
    setTimeout(() => {
      document.getElementById('warning').style.display = 'block';
    }, 3000);
  </script>
</body>
</html>
