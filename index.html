<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Ngọc</title>
    <style>
        body {
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: white;
            touch-action: none;
        }

        .title {
            font-size: 26px;
            font-weight: bold;
            background: linear-gradient(to right, #ff0000, #02ff2c, #0019ff, #ff0000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flow 2s linear infinite;
            padding: 20px;
            z-index: 1;
            pointer-events: none; /* Để tiêu đề không vướng chỗ nút chạy */
        }

        @keyframes flow {
            to { background-position: 200% center; }
        }

        .btn {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 50px; /* Làm nút bo tròn cho giống gaming */
            position: absolute;
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            touch-action: none;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        #btnYes {
            background-color: #28a745;
            color: white;
            z-index: 2;
            /* Vị trí mặc định lúc đầu */
            top: 55%;
            left: 15%;
        }

        #btnNo {
            background-color: #dc3545;
            color: white;
            z-index: 2;
            /* Vị trí mặc định lúc đầu */
            top: 55%;
            right: 15%;
        }
    </style>
</head>
<body>

    <div class="title">Ngọc bị ngu đúng không? <br> <span style="font-size: 16px; color: #aaa;">(Thoát ra là dốt 🤣)</span></div>

    <button id="btnYes" class="btn" onclick="sayYes()">ĐÚNG</button>
    <button id="btnNo" class="btn" ontouchstart="moveButton(this)" onmouseover="moveButton(this)">KHÔNG</button>

    <script>
        function sayYes() {
            alert("Đã bảo là ngu mà lại còn bấm 'Đúng' nữa!");
            alert("Virus NGU đã xâm nhập vào máy Ngọc thành công 100%!");
            window.location.href = "https://www.google.com/search?q=cách+chữa+bệnh+ngu+bẩm+sinh";
        }

        function moveButton(obj) {
            // Lấy kích thước màn hình
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            // Tính toán vị trí ngẫu nhiên hoàn toàn mới
            // Trừ đi khoảng 100px để nút không bị dính sát mép màn hình khó bấm
            const randX = Math.floor(Math.random() * (windowWidth - obj.clientWidth - 40)) + 20;
            const randY = Math.floor(Math.random() * (windowHeight - obj.clientHeight - 40)) + 20;

            obj.style.left = randX + "px";
            obj.style.top = randY + "px";
        }
    </script>
</body>
</html>
