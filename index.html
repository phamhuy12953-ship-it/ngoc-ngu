<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Ngọc</title>
    <style>
        body {
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: white;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        .title {
            padding: 20px;
            margin-bottom: 50px;
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        .rainbow-text {
            font-size: 32px;
            font-weight: bold;
            display: block;
            background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff, #ff0000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flow 3s linear infinite;
            margin-bottom: 10px;
        }

        .normal-text {
            font-size: 18px;
            font-weight: normal;
            color: white;
            display: block;
            opacity: 0.8;
        }

        @keyframes flow {
            to { background-position: 200% center; }
        }

        .btn {
            padding: 15px 25px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            position: absolute;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            z-index: 5;
            min-width: 100px;
            text-align: center;
        }

        #btnYes {
            background-color: #28a745;
            color: white;
            top: 70%;
            left: 10%;
        }

        #btnNo {
            background-color: #dc3545;
            color: white;
            top: 70%;
            right: 10%;
        }
    </style>
</head>
<body>

    <div class="title">
        <span class="rainbow-text">Ngọc bị ngu hahaha</span>
        <span class="normal-text">chan bố mày đi</span>
    </div>

    <button id="btnYes" class="btn" onclick="sayYes()">ĐÚNG</button>
    <button id="btnNo" class="btn" onmousedown="troll(this)" ontouchstart="troll(this)">KHÔNG</button>

    <script>
        let clickCount = 0;
        let isFakePity = false;

        function sayYes() {
            alert("Vừa định tha mà lại tự nhận mình NGU à? Hahaha!");
            alert("Thôi xong, virus NGU đã chiếm lấy não Ngọc!");
            window.location.href = "https://www.google.com/search?q=cách+chữa+bệnh+ngu+bản+thân";
        }

        function troll(obj) {
            clickCount++;

            // Sau 10 lần ấn hụt, bắt đầu giở trò "tha cho"
            if (clickCount >= 10 && !isFakePity) {
                isFakePity = true;
                obj.innerText = "tha cho này ấn đc r đó";
                obj.style.backgroundColor = "#007bff"; // Đổi sang màu xanh dương cho tin tưởng
                obj.style.width = "220px";
                obj.style.fontSize = "15px";
                
                // Cho nút đứng im một nhịp để Ngọc kịp bấm
                return; 
            }

            // Nếu Ngọc bấm vào cái nút "tha cho" này
            if (isFakePity) {
                obj.innerText = "ĐÚNG";
                obj.style.backgroundColor = "#28a745";
                obj.style.fontSize = "20px";
                sayYes();
                return;
            }

            // Logic nhảy ngẫu nhiên bình thường
            const randomWidth = Math.floor(Math.random() * (150 - 80 + 1)) + 80;
            obj.style.width = randomWidth + "px";

            const minTop = window.innerHeight * 0.4;
            const maxX = window.innerWidth - obj.clientWidth - 40;
            const maxY = window.innerHeight - obj.clientHeight - 40;

            const randX = Math.floor(Math.random() * maxX) + 20;
            const randY = Math.floor(Math.random() * (maxY - minTop)) + minTop;

            obj.style.left = randX + "px";
            obj.style.top = randY + "px";
        }
    </script>
</body>
</html>
