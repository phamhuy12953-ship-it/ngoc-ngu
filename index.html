<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gửi Ngọc</title>
    <style>
        body {
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; /* Không cho cuộn trang để nút không chạy ra ngoài */
            color: white;
            text-align: center;
        }

        .title {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(to right, #ff0000, #00ff00, #0000ff, #ff0000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flow 3s linear infinite;
            padding: 20px;
            margin-bottom: 50px;
        }

        @keyframes flow {
            to { background-position: 200% center; }
        }

        .btn {
            padding: 15px 35px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            position: absolute;
            transition: all 0.2s ease; /* Tốc độ trượt: 0.2 giây */
            touch-action: none; /* Quan trọng: Chặn các thao tác mặc định của đt để nút chạy mượt */
        }

        #btnYes {
            background-color: #28a745;
            color: white;
            top: 60%;
            left: 20%;
        }

        #btnNo {
            background-color: #dc3545;
            color: white;
            top: 60%;
            right: 20%;
        }
    </style>
</head>
<body>

    <div class="title">Ngọc bị ngu đúng không? <br> <span style="font-size: 18px; color: white;">(Thoát ra là NGUUUU)</span></div>

    <button id="btnYes" class="btn" onclick="sayYes()">ĐÚNG</button>
    <button id="btnNo" class="btn" ontouchstart="moveButton()" onmouseover="moveButton()">KHÔNG</button>

    <script>
        function sayYes() {
            alert("Biết thế là tốt! Hahaha");
            alert("Máy Ngọc đã chính thức nhiễm virus NGU!");
            window.location.href = "https://www.google.com/search?q=tại+sao+tôi+ngu";
        }

        function moveButton() {
            const btnNo = document.getElementById('btnNo');
            
            // Tính toán vùng an toàn để nút không chạy mất khỏi màn hình
            const maxX = window.innerWidth - btnNo.clientWidth - 20;
            const maxY = window.innerHeight - btnNo.clientHeight - 20;

            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            btnNo.style.left = randomX + 'px';
            btnNo.style.top = randomY + 'px';
        }
    </script>
</body>
</html>
