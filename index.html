<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Ngọc</title>
    <style>
        body {
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            color: white;
            touch-action: none;
            user-select: none;
        }

        /* --- CSS TROLL --- */
        #bg-glow {
            position: absolute;
            top: 50%; left: 50%; width: 0; height: 0;
            background: radial-gradient(circle, #ff007f 0%, #aa00ff 50%, #000000 100%);
            border-radius: 50%; opacity: 0; transition: all 0.8s ease-out;
            z-index: 100; transform: translate(-50%, -50%); pointer-events: none;
        }

        #smiley {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80px; font-weight: 900; opacity: 0; z-index: 101;
            transition: opacity 0.5s ease-out; pointer-events: none;
        }

        .rainbow-text {
            font-size: 32px; font-weight: bold;
            background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #ff00ff, #ff0000);
            background-size: 200% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; animation: flow 5s linear infinite;
        }

        @keyframes flow { to { background-position: 200% center; } }

        .btn {
            padding: 15px 25px; font-size: 18px; font-weight: bold; border: none;
            border-radius: 12px; position: absolute; cursor: pointer; z-index: 50;
        }

        #btnYes { background-color: #28a745; color: white; top: 70%; left: 10%; }
        #btnNo { background-color: #dc3545; color: white; top: 70%; right: 10%; }
        .hide-all { opacity: 0 !important; pointer-events: none !important; }
        .show-glow { width: 300vw !important; height: 300vw !important; opacity: 1 !important; }
        .show-smiley { opacity: 1 !important; }

        /* --- CSS BẢNG ĐÁP ÁN XỊN --- */
        #answer-app {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; color: #333; display: none;
            flex-direction: column; z-index: 200; text-align: left;
        }

        .header {
            background: #28a745; color: white; padding: 15px;
            text-align: center; font-weight: bold; font-size: 20px;
        }

        /* Thanh chọn câu (Các box ấn) */
        .question-nav {
            display: flex; overflow-x: auto; padding: 10px;
            background: #eee; gap: 8px; border-bottom: 1px solid #ccc;
        }

        .q-box {
            min-width: 45px; height: 45px; background: white;
            border: 2px solid #28a745; border-radius: 8px;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; cursor: pointer; flex-shrink: 0;
        }

        .q-box.active { background: #28a745; color: white; }

        .content-area { padding: 20px; overflow-y: auto; flex-grow: 1; }
        .sol-text { line-height: 1.6; font-size: 16px; display: none; }
        .sol-text.active { display: block; }
        .ans-highlight { color: #d32f2f; font-weight: bold; font-size: 18px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="bg-glow"></div>
    <div id="smiley">=))))</div>

    <div id="main-content">
        <span class="rainbow-text">Ngọc có đao không??</span>
        <div style="opacity:0.7; margin-top:10px">Thoát ra làm chó!</div>
    </div>

    <button id="btnYes" class="btn" onclick="triggerTrap(this)">ĐÚNG</button>
    <button id="btnNo" class="btn" onmousedown="troll(this)" ontouchstart="troll(this)">KHÔNG</button>

    <div id="answer-app">
        <div class="header">🎁 PHAO CỨU TRỢ TOÁN 10 🎁</div>
        
        <div class="question-nav" id="nav-bar">
            </div>

        <div class="content-area" id="sol-container">
            </div>
        
        <div style="padding:10px; text-align:center; font-size:12px; background:#f9f9f9; border-top:1px solid #ddd">
            Chép nhanh rồi cất máy đi "bro"!
        </div>
    </div>

    <script>
        const solutions = [
            { q: "Câu 1: Bán kính R của ΔABC đều cạnh 2cm.", s: "Công thức: R = (a√3)/3. Thay a = 2 => R = (2√3)/3 ≈ 1.15 cm.", a: "Đáp số: (2√3)/3 cm" },
            { q: "Câu 2: Đa giác có tổng góc là 1620°.", s: "Công thức: (n-2)*180 = 1620 => n-2 = 9 => n = 11 cạnh.", a: "Đáp số: 11" },
            { q: "Câu 3: Góc BAD khi góc BOD = 130°.", s: "Tứ giác nội tiếp, góc nội tiếp bằng nửa số đo cung bị chắn. Nếu chắn cung nhỏ: BAD = 130/2 = 65°.", a: "Đáp số: 65°" },
            { q: "Câu 4: Tính góc ABC.", s: "BOC = 120 => BAC = 60. ACO = 40 => OAB = 20. OBC = 30. Vậy ABC = 20 + 30 = 50°.", a: "Đáp số: 50°" },
            { q: "Câu 5: Cạnh ΔABC đều nội tiếp (O; 6cm).", s: "Cạnh a = R√3 = 6√3 ≈ 10.39. Làm tròn đến hàng đơn vị là 10.", a: "Đáp số: 10 cm" },
            { q: "Câu 6: Bán kính (O) khi AB=9, AC=12, AH=4.", s: "Công thức: R = (AB*AC)/(2*AH) = (9*12)/(2*4) = 13.5. Làm tròn là 14.", a: "Đáp số: 14 cm" },
            { q: "Câu 7: Diện tích HCN d=5cm, a=2b.", s: "b√5 = 5 => b=√5, a=2√5. S = a*b = 2*5 = 10.", a: "Đáp số: 10 cm²" },
            { q: "Câu 8: Tính góc BAD (Góc có đỉnh ngoài đường tròn).", s: "Dựa vào AMD=20°, ANB=40° và tính chất tứ giác nội tiếp. Tính ra góc BAD = 60°.", a: "Đáp số: 60°" },
            { q: "Câu 9: Cạnh ngũ giác đều r=5cm.", s: "a = 2r * tan(36°) = 10 * 0.7265 ≈ 7.265. Làm tròn 7.3.", a: "Đáp số: 7,3 cm" },
            { q: "Câu 10: Cạnh khung gỗ Δđều đựng đồng hồ d=40cm.", s: "r=20. Cạnh a = 2r√3 = 40√3 ≈ 69.28. Làm tròn 69.", a: "Đáp số: 69 cm" },
            { q: "Câu 11: Tìm góc AOB.", s: "ADC=70 => cung ABC=140. OBC=50 => cung BC=80. Cung AB = 140-80=60. Vậy AOB=60°.", a: "Đáp số: 60°" },
            { q: "Câu 12: Khoảng cách từ đèn đến 3 đỉnh Δcạnh 100m.", s: "Chính là bán kính R = (a√3)/3 = (100√3)/3 ≈ 57.73.", a: "Đáp số: 57,7 m" }
        ];

        // Khởi tạo bảng đáp án
        const nav = document.getElementById('nav-bar');
        const container = document.getElementById('sol-container');

        solutions.forEach((item, index) => {
            // Tạo box số
            const box = document.createElement('div');
            box.className = 'q-box' + (index === 0 ? ' active' : '');
            box.innerText = index + 1;
            box.onclick = () => showTab(index);
            nav.appendChild(box);

            // Tạo nội dung giải
            const div = document.createElement('div');
            div.className = 'sol-text' + (index === 0 ? ' active' : '');
            div.id = 'sol-' + index;
            div.innerHTML = `<h3>${item.q}</h3><p>${item.s}</p><div class="ans-highlight">${item.a}</div>`;
            container.appendChild(div);
        });

        function showTab(index) {
            document.querySelectorAll('.q-box').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.sol-text').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.q-box')[index].classList.add('active');
            document.getElementById('sol-' + index).classList.add('active');
        }

        // --- LOGIC TROLL ---
        let clicks = 0; let pited = false; let locked = false;

        function triggerTrap(obj) {
            if (locked) return;
            locked = true;
            obj.innerText = "ĐÚNG";
            obj.style.backgroundColor = "#28a745";
            setTimeout(() => {
                document.getElementById('main-content').classList.add('hide-all');
                document.getElementById('btnYes').classList.add('hide-all');
                document.getElementById('btnNo').classList.add('hide-all');
                document.getElementById('bg-glow').classList.add('show-glow');
                setTimeout(() => {
                    document.getElementById('smiley').classList.add('show-smiley');
                    setTimeout(() => {
                        document.getElementById('answer-app').style.display = 'flex';
                    }, 2000);
                }, 500);
            }, 1000);
        }

        function troll(obj) {
            if (locked) return;
            clicks++;
            if (clicks >= 5 && !pited) {
                pited = true;
                obj.innerText = "Sếp tha!"; obj.style.backgroundColor = "#007bff";
                obj.style.width = "200px"; return;
            }
            if (pited) { triggerTrap(obj); return; }
            const rw = Math.floor(Math.random() * 50) + 80;
            obj.style.width = rw + "px";
            const minT = window.innerHeight * 0.4;
            const rx = Math.floor(Math.random() * (window.innerWidth - obj.clientWidth - 40)) + 20;
            const ry = Math.floor(Math.random() * (window.innerHeight - obj.clientHeight - 40 - minT)) + minT;
            obj.style.left = rx + "px"; obj.style.top = ry + "px";
        }
    </script>
</body>
</html>
