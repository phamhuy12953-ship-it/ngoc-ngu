<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Ngọc</title>
    <style>
        body {
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: white;
            touch-action: none;
            text-align: center;
        }

        .title {
            padding: 20px;
            margin-bottom: 50px;
            z-index: 1;
        }

        .rainbow-text {
            font-size: 32px;
            font-weight: bold;
            display: block;
            background: linear-gradient(to right, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff, #ff0000);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: flow 3s linear infinite;
            margin-bottom: 10px;
        }

        .normal-text {
            font-size: 18px;
            font-weight: normal;
            color: white;
            display: block;
        }

        @keyframes flow {
            to { background-position: 200% center; }
        }

        .btn {
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            position: absolute;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            white-space: nowrap; /* Không cho chữ xuống dòng */
        }

        #btnYes {
            background-color: #28a745;
            color: white;
            top: 65%;
            left: 15%;
            width: 120px;
        }

        #btnNo {
            background-color: #dc3545;
            color: white;
            top: 65%;
            right: 15%;
            min-width: 80px; /* Độ dài tối thiểu */
            max-width: 200px; /* Giới hạn không cho nó phình to quá */
        }
    </style>
</head>
<body>

    <div class="title">
        <span class="rainbow-text">Ngọc bị ngu hahaha</span>
        <span class="normal-text">chan bố mày đi</span>
    </div>

    <button id="btnYes" class="btn" onclick="sayYes()">ĐÚNG</button>
    <button id="btnNo" class="btn" onmousedown="troll(this)" ontouchstart="troll(this)">KHÔNG</button>

    <script>
        function sayYes() {
            alert("Đã bảo là ngu mà lại còn bấm 'Đúng' nữa!");
            alert("Chúc mừng Ngọc đã gia nhập hội những người NGU nhất hành tinh!");
            window.location.href = "https://www.google.com/search?q=cách+giảm+độ+ngu+bẩm+sinh";
        }

        function troll(obj) {
            // 1. Thay đổi độ dài (width) ngẫu nhiên từ 80px đến 200px
            const randomWidth = Math.floor(Math.random() * (200 - 80 + 1)) + 80;
            obj.style.width = randomWidth + "px";

            // 2. Tính toán vị trí nhảy ngẫu nhiên
            const maxX = window.innerWidth - randomWidth - 40;
            const maxY = window.innerHeight - obj.clientHeight - 40;

            const randX = Math.floor(Math.random() * maxX) + 20;
            const randY = Math.floor(Math.random() * maxY) + 20;

            obj.style.left = randX + "px";
            obj.style.top = randY + "px";
        }
    </script>
</body>
</html>
