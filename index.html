<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gửi Ngọc</title>
    <style>
        :root { --primary: #28a745; --accent: #ff007f; }
        body {
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            color: white;
            touch-action: none;
            user-select: none;
            text-align: center;
        }

        /* --- TROLL EFFECTS --- */
        #bg-glow {
            position: absolute;
            top: 50%; left: 50%; width: 0; height: 0;
            background: radial-gradient(circle, var(--accent) 0%, #aa00ff 50%, #000000 100%);
            border-radius: 50%; opacity: 0; 
            transition: width 1.2s cubic-bezier(0.23, 1, 0.32, 1), height 1.2s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.8s;
            z-index: 100; transform: translate(-50%, -50%); pointer-events: none;
        }

        #smiley {
            position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 80px; font-weight: 900; opacity: 0; z-index: 101;
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        #main-content { transition: transform 0.8s ease, opacity 0.5s ease; z-index: 10; }

        .rainbow-text {
            font-size: 32px; font-weight: bold; display: block;
            background: linear-gradient(to right, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            background-size: 200% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; animation: flow 5s linear infinite;
        }

        .btn {
            padding: 15px 25px; font-size: 18px; font-weight: bold; border: none;
            border-radius: 15px; position: absolute; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; z-index: 50; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #btnYes { background: var(--primary); color: white; top: 70%; left: 15%; }
        #btnNo { background: #dc3545; color: white; top: 70%; right: 15%; }

        .hide-all { opacity: 0 !important; transform: scale(0.8) !important; pointer-events: none !important; }
        .show-glow { width: 350vw !important; height: 350vw !important; opacity: 1 !important; }
        .show-smiley { opacity: 1 !important; transform: translate(-50%, -50%) scale(1.2) !important; }

        /* --- APP GIẢI TOÁN --- */
        #answer-app {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; color: #333; display: none;
            flex-direction: column; z-index: 200; text-align: left;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .header { 
            background: var(--primary); color: white; padding: 18px; 
            text-align: center; font-weight: bold; font-size: 18px;
        }

        .question-nav {
            display: flex; overflow-x: auto; padding: 12px; background: #f1f3f5;
            gap: 10px; border-bottom: 1px solid #ddd; scrollbar-width: none;
        }

        .q-box {
            min-width: 46px; height: 46px; background: white; border: 2px solid var(--primary);
            border-radius: 10px; display: flex; justify-content: center; align-items: center;
            font-weight: bold; cursor: pointer; flex-shrink: 0; transition: 0.3s;
        }

        .q-box.active { background: var(--primary); color: white; transform: scale(1.1); }

        .content-area { padding: 20px; overflow-y: auto; flex-grow: 1; }
        
        .sol-text { display: none; animation: fadeIn 0.4s ease; line-height: 1.7; }
        .sol-text.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .step-box { background: #f8f9fa; border-left: 4px solid #28a745; padding: 10px; margin: 10px 0; font-size: 14px; }
        .final-ans { color: #d32f2f; font-weight: bold; font-size: 17px; margin-top: 10px; text-decoration: underline; }
        b { color: #000; }
    </style>
</head>
<body>

    <div id="bg-glow"></div>
    <div id="smiley">=))))</div>

    <div id="main-content">
        <span class="rainbow-text">Ngọc có đao không??</span>
        <span style="display:block; margin-top:10px; opacity:0.7;">Chạy đâu cho thoát!</span>
    </div>

    <button id="btnYes" class="btn" onclick="triggerTrap(this)">ĐÚNG</button>
    <button id="btnNo" class="btn" onmousedown="troll(this)" ontouchstart="troll(this)">KHÔNG</button>

    <div id="answer-app">
        <div class="header">📗 GIẢI CHI TIẾT TOÁN 9 (ÔN THI VÀO 10) 📗</div>
        <div class="question-nav" id="nav-bar"></div>
        <div class="content-area" id="sol-container"></div>
        <div style="padding:10px; text-align:center; font-size:11px; color:#999; border-top:1px solid #eee;">
            Gia Lộc I - Sigma Hacker
        </div>
    </div>

    <script>
        const solutions = [
            { 
                q: "Câu 1: Bán kính R của ΔABC đều cạnh 2cm.", 
                s: "<b>Phân tích:</b> ΔABC đều nên tâm đường tròn ngoại tiếp trùng với trọng tâm G.<br><div class='step-box'>1. Tính chiều cao AM: AM = a√3 / 2 = 2 * √3 / 2 = √3 (cm).<br>2. Tính R (đoạn AG): R = (2/3) * AM = (2/3) * √3 = 2√3/3 (cm).</div>", 
                a: "Kết quả: R = 2√3/3 cm" 
            },
            { 
                q: "Câu 2: Đa giác n cạnh có tổng số đo các góc là 1620°.", 
                s: "<b>Áp dụng công thức:</b> Tổng góc đa giác = (n - 2) * 180°.<br><div class='step-box'>- Ta có phương trình: (n - 2) * 180 = 1620.<br>- Giải ra: n - 2 = 1620 / 180 = 9.<br>- Vậy n = 9 + 2 = 11.</div>", 
                a: "Kết quả: n = 11 cạnh" 
            },
            { 
                q: "Câu 3: Tứ giác ABCD nội tiếp (O), BOD = 130°. Tính góc BAD.", 
                s: "<b>Lý thuyết:</b> Góc ở tâm bằng 2 lần góc nội tiếp cùng chắn một cung.<br><div class='step-box'>- Góc ở tâm BOD chắn cung nhỏ BCD => sđ cung BCD = 130°.<br>- Góc nội tiếp BAD cũng chắn cung nhỏ BCD.<br>- Vậy BAD = (1/2) * sđ cung BCD = 130° / 2 = 65°.</div>", 
                a: "Kết quả: BAD = 65°" 
            },
            { 
                q: "Câu 4: ΔABC nội tiếp, BOC = 120°, ACO = 40°. Tính góc ABC.", 
                s: "<b>Từng bước giải:</b><br><div class='step-box'>1. BOC = 120° => BAC = 60° (góc nội tiếp).<br>2. ΔAOC cân tại O (OA=OC) => OAC = ACO = 40°.<br>3. OAB = BAC - OAC = 60° - 40° = 20°.<br>4. ΔOAB cân => ABO = 20°. ΔOBC cân có góc ở tâm 120° nên OBC = (180-120)/2 = 30°.<br>5. ABC = ABO + OBC = 20° + 30° = 50°.</div>", 
                a: "Kết quả: ABC = 50°" 
            },
            { 
                q: "Câu 5: Cạnh ΔABC đều nội tiếp (O; 6cm).", 
                s: "<b>Công thức nhanh:</b> Cạnh tam giác đều nội tiếp là a = R√3.<br><div class='step-box'>- Thay số: a = 6 * √3 ≈ 10.392 cm.<br>- Làm tròn đến hàng đơn vị theo yêu cầu đề bài: 10.</div>", 
                a: "Kết quả: 10 cm" 
            },
            { 
                q: "Câu 6: AB=9, AC=12, AH=4 nội tiếp (O). Tính bán kính R.", 
                s: "<b>Công thức:</b> Trong tam giác nội tiếp đường tròn, R = (AB * AC) / (2 * AH).<br><div class='step-box'>- Thay số: R = (9 * 12) / (2 * 4) = 108 / 8 = 13.5 (cm).<br>- Làm tròn đến hàng đơn vị: 14.</div>", 
                a: "Kết quả: 14 cm" 
            },
            { 
                q: "Câu 7: Diện tích HCN có d=5cm, dài gấp đôi rộng.", 
                s: "<b>Giải:</b> Gọi chiều rộng là x, chiều dài là 2x.<br><div class='step-box'>1. Pitago: x² + (2x)² = 5² => 5x² = 25 => x² = 5.<br>2. Diện tích S = dài * rộng = 2x * x = 2x².<br>3. Thay x² = 5 vào: S = 2 * 5 = 10 (cm²).</div>", 
                a: "Kết quả: 10 cm²" 
            },
            { 
                q: "Câu 8: Tính góc BAD dựa trên AMD=20°, ANB=40°.", 
                s: "<b>Lý thuyết:</b> Sử dụng tính chất góc có đỉnh nằm ngoài đường tròn và tứ giác nội tiếp.<br><div class='step-box'>- Gọi sđ cung BC = x, sđ cung AD = y.<br>- Ta có hệ: (y - x)/2 = 20 và các liên hệ trong tứ giác nội tiếp.<br>- Sau khi giải hệ số đo các cung, ta tính được góc BAD = 60°.</div>", 
                a: "Kết quả: BAD = 60°" 
            },
            { 
                q: "Câu 9: Cạnh ngũ giác đều ngoại tiếp r = 5cm.", 
                s: "<b>Công thức:</b> Cạnh a = 2 * r * tan(180°/n). Với n = 5.<br><div class='step-box'>- Thay số: a = 2 * 5 * tan(36°).<br>- Tính: a = 10 * 0.7265 ≈ 7.265 (cm).<br>- Làm tròn đến chữ số thập phân thứ nhất: 7.3.</div>", 
                a: "Kết quả: 7,3 cm" 
            },
            { 
                q: "Câu 10: Khung gỗ Δđều đựng khít đồng hồ tròn d = 40cm.", 
                s: "<b>Giải:</b> Đồng hồ d=40 nên bán kính nội tiếp r = 20 cm.<br><div class='step-box'>1. Trong tam giác đều: r = a√3 / 6.<br>2. Rút ra a: a = 6r / √3 = 2r√3.<br>3. Thay số: a = 2 * 20 * √3 = 40√3 ≈ 69.28 (cm).<br>4. Làm tròn đơn vị: 69.</div>", 
                a: "Kết quả: 69 cm" 
            },
            { 
                q: "Câu 11: Tìm góc AOB khi ADC = 70°, OBC = 50°.", 
                s: "<b>Từng bước:</b><br><div class='step-box'>1. ADC=70° chắn cung ABC => sđ cung ABC = 140°.<br>2. ΔOBC cân (OB=OC) có góc đáy 50° => góc đỉnh BOC = 180-100 = 80°.<br>3. sđ cung BC = sđ góc BOC = 80°.<br>4. sđ cung AB = sđ cung ABC - sđ cung BC = 140 - 80 = 60°.<br>5. Góc ở tâm AOB chắn cung AB => AOB = 60°.</div>", 
                a: "Kết quả: AOB = 60°" 
            },
            { 
                q: "Câu 12: Đèn cách đều 3 đỉnh Δcạnh 100m. Tính khoảng cách.", 
                s: "<b>Phân tích:</b> Điểm cách đều 3 đỉnh là tâm đường tròn ngoại tiếp R.<br><div class='step-box'>- Công thức R = a√3 / 3.<br>- Thay số: R = 100 * √3 / 3 ≈ 57.735 (m).<br>- Làm tròn đến thập phân thứ nhất: 57.7.</div>", 
                a: "Kết quả: 57,7 m" 
            }
        ];

        const nav = document.getElementById('nav-bar');
        const container = document.getElementById('sol-container');

        solutions.forEach((item, index) => {
            const box = document.createElement('div');
            box.className = 'q-box' + (index === 0 ? ' active' : '');
            box.innerText = index + 1;
            box.onclick = () => {
                document.querySelectorAll('.q-box').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.sol-text').forEach(t => t.classList.remove('active'));
                box.classList.add('active');
                document.getElementById('sol-' + index).classList.add('active');
            };
            nav.appendChild(box);

            const div = document.createElement('div');
            div.className = 'sol-text' + (index === 0 ? ' active' : '');
            div.id = 'sol-' + index;
            div.innerHTML = `<h3 style="color:var(--primary); margin:0 0 10px 0">${item.q}</h3><div>${item.s}</div><div class="final-ans">${item.a}</div>`;
            container.appendChild(div);
        });

        let clicks = 0; let pited = false; let locked = false;

        function triggerTrap(obj) {
            if (locked) return; locked = true;
            obj.innerText = "ĐÚNG";
            setTimeout(() => {
                document.getElementById('main-content').classList.add('hide-all');
                document.getElementById('btnYes').classList.add('hide-all');
                document.getElementById('btnNo').classList.add('hide-all');
                document.getElementById('bg-glow').classList.add('show-glow');
                setTimeout(() => {
                    document.getElementById('smiley').classList.add('show-smiley');
                    setTimeout(() => {
                        document.getElementById('answer-app').style.display = 'flex';
                    }, 2200);
                }, 600);
            }, 1000);
        }

        function troll(obj) {
            if (locked) return;
            clicks++;
            if (clicks >= 5 && !pited) {
                pited = true; obj.innerText = "Sếp tha cho em!";
                obj.style.backgroundColor = "#007bff"; obj.style.width = "220px"; return;
            }
            if (pited) { triggerTrap(obj); return; }
            const rw = Math.floor(Math.random() * 50) + 80;
            obj.style.width = rw + "px";
            const minT = window.innerHeight * 0.4;
            const rx = Math.floor(Math.random() * (window.innerWidth - obj.clientWidth - 40)) + 20;
            const ry = Math.floor(Math.random() * (window.innerHeight - obj.clientHeight - 40 - minT)) + minT;
            obj.style.left = rx + "px"; obj.style.top = ry + "px";
        }
    </script>
</body>
</html>
