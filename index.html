<!DOCTYPE html>
<html>
<head>
<style>
  body {
    /* Nền đen toàn màn hình */
    background-color: black;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
  }

  .rainbow-text {
    font-size: 60px;
    font-weight: 900;
    /* Hiệu ứng dải màu RGB bàn phím */
    background: linear-gradient(
      to right, 
      #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff, #ff0000
    );
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    /* Chuyển màu mượt, không nhấp nháy giật mắt */
    animation: flow 3s linear infinite;
    text-align: center;
  }

  @keyframes flow {
    to {
      background-position: 200% center;
    }
  }

  .sub-text {
    font-size: 35px;
    color: #ffffff;
    font-weight: bold;
    margin-top: 20px;
    opacity: 0.8;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

  <div class="rainbow-text">Ngọc bị ngu hahaha</div>
  <div class="sub-text">chan bố mày đi</div>

</body>
</html>
